<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jut-Score Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            font-family: "Manrope", sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .login-card {
            width: min(400px, calc(100vw - 32px));
            padding: 2.5rem;
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }
        .brand-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            font-size: 1.5rem;
            background: #3b82f6;
            color: white;
            margin-bottom: 1.5rem;
        }
        .form-control {
            min-height: 50px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 0 1rem;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }
        .btn-login {
            min-height: 50px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            background: #3b82f6;
            color: white;
            transition: opacity 0.2s;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="brand-icon"><i class="bi bi-shield-lock-fill"></i></div>
        <h1 class="h3 fw-bold mb-2">Private Vault</h1>
        <p class="text-muted mb-4 small">Enter password to access Pavan's files.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category in ['success', 'danger', 'warning', 'info'] else 'info' }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <label class="form-label fw-semibold">Access password</label>
            <input type="password" name="password" class="form-control mb-3" placeholder="Enter password" required autofocus>
            <button type="submit" class="btn btn-primary btn-login w-100">Unlock</button>
        </form>
    </main>
</body>
</html>
